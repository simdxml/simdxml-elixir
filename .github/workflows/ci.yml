name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SIMDXML_BUILD: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.16"
            otp: "26"
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            native/simdxml_nif/target
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock', 'native/simdxml_nif/Cargo.lock') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            native/simdxml_nif/target
          key: ${{ runner.os }}-lint-${{ hashFiles('mix.lock', 'native/simdxml_nif/Cargo.lock') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: cd native/simdxml_nif && cargo fmt -- --check
      - run: cd native/simdxml_nif && cargo clippy -- -D warnings
